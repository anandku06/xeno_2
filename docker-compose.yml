services:
  postgres:
    image: postgres:15-alpine
    container_name: xeno-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: xeno
      POSTGRES_PASSWORD: xeno_secret
      POSTGRES_DB: xeno_crm
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: xeno-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
